<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <header>
        <h1>Cadastro de alunos</h1>
    </header>

    <main>
        <p>Nesta aba será realizado o cadastro do aluno, insira os dados abaixo:</p>
        <label for="">Nome Completo:</label>
        <input type="text" placeholder="Nome completo..." id="nome">
        <br>
        <label for="">Turma:</label>
        <select name="" id="turmas">
            <option value="" disabled selected>Informe sua Turma</option>
            <option value="1M">1° MATUTINO</option>
            <option value="1V">1° VESPERTINO</option>
            <option value="2M">2° MATUTINO</option>
            <option value="2V">2° VESPERTINO</option>
            <option value="3M">3° MATUTINO</option>
            <option value="3V">3° VESPERTINO</option>
        </select>
        <p id="titulo">Escolha o tipo referente a sua nota:</p>
        <select name="" id="opcoes">
            <option value="" disabled selected>Informe a opção</option>
            <option>Avaliação</option>
            <option value="">Bimestre</option>
        </select>
        

        <div class="linha">

            <div>
                <label for="" >Nota 1:</label>
                <input type="number" id="nota1">
            </div>
            
            <div>
                <label for="" >Nota 2:</label>
                <input type="number" id="nota2">
            </div> 
        </div>

        <p class="titulo">Informe sua frequência na disciplina:</p>

        <label for="porcentagem">Frequência:</label>

        <input type="number" name="" id="porcentagem" min="0" max="100" step="1" placeholder="0%">
        <button id="Enviar" onclick="cadastrar()">Cadastrar</button>
        
        <div id="resultado"></div>
        <script src="cadastro.js"></script>
    </main>
</body>
</html>
